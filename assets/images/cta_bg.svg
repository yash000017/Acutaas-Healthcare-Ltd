<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#1A2333" />
    </linearGradient>
    <radialGradient id="ctaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#ctaGrad)" />
  <circle cx="960" cy="540" r="800" fill="url(#ctaGlow)" />

  <!-- Left Side: Particle Stream / Connection Nodes -->
  <g transform="translate(100, 150)" opacity="0.12">
    <line x1="100" y1="200" x2="250" y2="100" stroke="#FFFFFF" stroke-width="2.5" />
    <line x1="250" y1="100" x2="400" y2="250" stroke="#FFFFFF" stroke-width="2.5" />
    <line x1="400" y1="250" x2="250" y2="400" stroke="#FFFFFF" stroke-width="2.5" />
    <line x1="250" y1="400" x2="100" y2="200" stroke="#FFFFFF" stroke-width="2.5" />
    <line x1="250" y1="100" x2="250" y2="400" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5,5" />
    <circle cx="100" cy="200" r="10" fill="#C9A86A" />
    <circle cx="250" cy="100" r="14" fill="#FFFFFF" />
    <circle cx="400" cy="250" r="10" fill="#818CF8" />
    <circle cx="250" cy="400" r="12" fill="#FFFFFF" />
  </g>

  <!-- Right Side: Giant abstract flower/medicine molecule -->
  <g transform="translate(1450, 450)" opacity="0.15">
    <circle cx="100" cy="100" r="80" fill="none" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="100" cy="100" r="120" fill="none" stroke="#C9A86A" stroke-width="2" stroke-dasharray="10,5" />
    <circle cx="100" cy="100" r="160" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    <!-- Floating crosshairs / dots -->
    <circle cx="-20" cy="100" r="8" fill="#818CF8" />
    <circle cx="220" cy="100" r="8" fill="#818CF8" />
    <circle cx="100" cy="-20" r="8" fill="#C9A86A" />
    <circle cx="100" cy="220" r="8" fill="#C9A86A" />
  </g>

  <!-- Subtle EKG Wave spanning the bottom -->
  <path d="M 0,900 L 600,900 L 630,860 L 660,940 L 690,780 L 720,1020 L 750,900 L 1920,900" fill="none" stroke="#818CF8" stroke-width="2" opacity="0.1" stroke-linecap="round" stroke-linejoin="round" />
</svg>
