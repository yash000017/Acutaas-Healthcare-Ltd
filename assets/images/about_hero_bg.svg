<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="helixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#818CF8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#C9A86A" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1920" height="1080" fill="#F8FAFC" />

  <!-- Grid Pattern -->
  <g opacity="0.06">
    <path d="M 0,100 L 1920,100 M 0,200 L 1920,200 M 0,300 L 1920,300 M 0,400 L 1920,400 M 0,500 L 1920,500 M 0,600 L 1920,600 M 0,700 L 1920,700 M 0,800 L 1920,800 M 0,900 L 1920,900 M 0,1000 L 1920,1000" stroke="#94A3B8" stroke-width="1" />
    <path d="M 100,0 L 100,1080 M 200,0 L 200,1080 M 300,0 L 300,1080 M 400,0 L 400,1080 M 500,0 L 500,1080 M 600,0 L 600,1080 M 700,0 L 700,1080 M 800,0 L 800,1080 M 900,0 L 900,1080 M 1000,0 L 1000,1080 M 1100,0 L 1100,1080 M 1200,0 L 1200,1080 M 1300,0 L 1300,1080 M 1400,0 L 1400,1080 M 1500,0 L 1500,1080 M 1600,0 L 1600,1080 M 1700,0 L 1700,1080 M 1800,0 L 1800,1080" stroke="#94A3B8" stroke-width="1" />
  </g>

  <!-- Giant DNA Helix on the right side -->
  <g transform="translate(1500, 100)">
    <!-- Main Helix Sine Curves -->
    <path d="M 100,0 C 250,150 -50,300 100,450 C 250,600 -50,750 100,900" fill="none" stroke="url(#helixGrad)" stroke-width="6" />
    <path d="M 100,0 C -50,150 250,300 100,450 C -50,600 250,750 100,900" fill="none" stroke="url(#helixGrad)" stroke-width="6" />

    <!-- Connecting Rungs -->
    <line x1="25" y1="75" x2="175" y2="75" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    <line x1="100" y1="150" x2="100" y2="150" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    <line x1="175" y1="225" x2="25" y2="225" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    <line x1="100" y1="300" x2="100" y2="300" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    <line x1="25" y1="375" x2="175" y2="375" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    
    <line x1="25" y1="525" x2="175" y2="525" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    <line x1="175" y1="675" x2="25" y2="675" stroke="#C9A86A" stroke-width="2" opacity="0.08" />
    <line x1="25" y1="825" x2="175" y2="825" stroke="#4F46E5" stroke-width="2" opacity="0.08" />
    
    <!-- Base Nodes -->
    <circle cx="25" cy="75" r="7" fill="#4F46E5" opacity="0.15" />
    <circle cx="175" cy="75" r="7" fill="#818CF8" opacity="0.15" />
    <circle cx="25" cy="225" r="7" fill="#818CF8" opacity="0.15" />
    <circle cx="175" cy="225" r="7" fill="#4F46E5" opacity="0.15" />
    <circle cx="25" cy="375" r="7" fill="#C9A86A" opacity="0.15" />
    <circle cx="175" cy="375" r="7" fill="#E6C98F" opacity="0.15" />
    <circle cx="25" cy="525" r="7" fill="#4F46E5" opacity="0.15" />
    <circle cx="175" cy="525" r="7" fill="#818CF8" opacity="0.15" />
    <circle cx="25" cy="675" r="7" fill="#C9A86A" opacity="0.15" />
    <circle cx="175" cy="675" r="7" fill="#E6C98F" opacity="0.15" />
    <circle cx="25" cy="825" r="7" fill="#818CF8" opacity="0.15" />
    <circle cx="175" cy="825" r="7" fill="#4F46E5" opacity="0.15" />
  </g>

  <!-- Left Side: Chemical Molecules / Benzene Rings -->
  <g transform="translate(150, 200)" opacity="0.15">
    <polygon points="120,50 180,85 180,155 120,190 60,155 60,85" fill="none" stroke="#4F46E5" stroke-width="3" />
    <polygon points="180,155 240,190 240,260 180,295 120,260 120,190" fill="none" stroke="#C9A86A" stroke-width="3" />
    <!-- Atoms -->
    <circle cx="120" cy="50" r="8" fill="#4F46E5" />
    <circle cx="180" cy="85" r="8" fill="#818CF8" />
    <circle cx="60" cy="85" r="6" fill="#cbd5e1" />
    <circle cx="180" cy="295" r="8" fill="#C9A86A" />
    <circle cx="240" cy="190" r="6" fill="#cbd5e1" />
    <!-- Double Bonds -->
    <line x1="170" y1="95" x2="170" y2="145" stroke="#818CF8" stroke-width="2" />
    <line x1="75" y1="145" x2="115" y2="175" stroke="#4F46E5" stroke-width="2" />
    <line x1="135" y1="250" x2="175" y2="275" stroke="#C9A86A" stroke-width="2" />
  </g>

  <!-- Mid-Left: Microscope Outline -->
  <g transform="translate(450, 600)" opacity="0.08">
    <path d="M 50,250 L 250,250 M 150,250 L 150,200 C 150,200 130,120 180,80 C 200,60 220,60 240,80 L 220,100" fill="none" stroke="#4F46E5" stroke-width="6" stroke-linecap="round" />
    <path d="M 200,50 L 260,110 M 215,35 L 245,65" fill="none" stroke="#C9A86A" stroke-width="6" stroke-linecap="round" />
    <rect x="110" y="160" width="80" height="20" rx="5" fill="none" stroke="#cbd5e1" stroke-width="4" />
    <circle cx="150" cy="170" r="5" fill="#4F46E5" />
  </g>

  <!-- Center: EKG Wave line -->
  <path d="M 600,540 L 750,540 L 770,500 L 790,580 L 810,440 L 830,600 L 850,540 L 1100,540" fill="none" stroke="#818CF8" stroke-width="3" opacity="0.12" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Floating Circles / Laboratory Cells -->
  <g opacity="0.1">
    <circle cx="950" cy="250" r="40" fill="none" stroke="#4F46E5" stroke-width="2" stroke-dasharray="8,4" />
    <circle cx="950" cy="250" r="10" fill="#818CF8" />
    <circle cx="1020" cy="210" r="15" fill="none" stroke="#C9A86A" stroke-width="2" />

    <circle cx="300" cy="800" r="30" fill="none" stroke="#C9A86A" stroke-width="2" />
    <circle cx="300" cy="800" r="8" fill="#E6C98F" />
    <circle cx="250" cy="850" r="12" fill="none" stroke="#4F46E5" stroke-width="2" />
  </g>
</svg>
